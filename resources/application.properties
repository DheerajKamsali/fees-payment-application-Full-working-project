spring.application.name=fee-payments
server.port=8080

razorpay.key=your_key
razorpay.secret=your_secret

spring.datasource.url=jdbc:mysql://localhost:3306/feedb?createDatabaseIfNotExist=true
spring.datasource.username=your_username
spring.datasource.password=your_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_organisation_mail
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true