<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5 col-md-4">

<div class="card p-4">

<h4>Forgot Password</h4>

<input id="email" class="form-control mb-3" placeholder="Enter registered email">

<button class="btn btn-primary w-100" onclick="send()">Send Reset Link</button>

</div>

</div>

<script>

function send(){

fetch("/auth/forgot-password?email="+document.getElementById("email").value,{
method:"POST"
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

</script>

</body>
</html>
