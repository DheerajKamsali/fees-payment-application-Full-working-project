<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "ROLE_ADMIN"){
alert("Access Denied");
window.location="login.html";
}

</script>

<div class="container mt-5">

<div class="d-flex justify-content-between mb-4">

<h2>Admin Dashboard</h2>

<div>

<button class="btn btn-primary me-2" onclick="downloadReport()">
Download PDF
</button>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

</div>


<div class="row mb-4">

<div class="col-md-4">
<div class="card p-3">
<h5>Total Payments</h5>
<h3 id="total"></h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Successful</h5>
<h3 id="success"></h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h5>Failed</h5>
<h3 id="failed"></h3>
</div>
</div>

</div>


<h4>All Payments</h4>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>ID</th>
<th>Student Name</th>
<th>Email</th>
<th>Order ID</th>
<th>Payment ID</th>
<th>Amount</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<script>

fetch("/admin/stats",{
headers:{ "Authorization":"Bearer "+token }
})
.then(res=>res.json())
.then(data=>{

document.getElementById("total").innerText=data.total;
document.getElementById("success").innerText=data.success;
document.getElementById("failed").innerText=data.failed;

});


fetch("/admin/payments",{
headers:{ "Authorization":"Bearer "+token }
})
.then(res=>res.json())
.then(data=>{

let rows="";

data.forEach(p=>{

rows += `
<tr>
<td>${p.id}</td>
<td>${p.studentName}</td>
<td>${p.studentEmail}</td>
<td>${p.orderId}</td>
<td>${p.paymentId}</td>
<td>${p.amount}</td>
<td>${p.status}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = rows;

});


function logout(){

localStorage.removeItem("token");
localStorage.removeItem("role");
window.location="login.html";

}


function downloadReport(){

fetch("/admin/download-report",{
headers:{ "Authorization":"Bearer "+token }
})
.then(res=>res.blob())
.then(blob=>{

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href=url;
a.download="payment-report.pdf";

document.body.appendChild(a);
a.click();
a.remove();

});

}

</script>

</body>
</html>
