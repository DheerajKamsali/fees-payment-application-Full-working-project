<!DOCTYPE html>
<html>
<head>

<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<div class="container mt-5 col-md-4">

<div class="card p-4">

<h4>Reset Password</h4>

<!-- <input id="password" type="password" class="form-control mb-3" placeholder="New Password">

<input id="confirm" type="password" class="form-control mb-3" placeholder="Confirm Password"> -->

<div class="mb-3 position-relative">
    <input id="password" type="password" class="form-control" placeholder="New Password">
    <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3"
       id="togglePassword"
       style="cursor:pointer;"></i>
</div>

<div class="mb-3 position-relative">
    <input id="confirm" type="password" class="form-control" placeholder="Confirm Password">
    <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3"
       id="toggleConfirm"
       style="cursor:pointer;"></i>
</div>

<button class="btn btn-success w-100" onclick="reset()">Update Password</button>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const token=params.get("token");

function reset(){

let pass=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(pass!==confirm){
alert("Passwords do not match");
return;
}

fetch("/auth/reset-password?token="+token+"&password="+pass,{
method:"POST"
})
.then(res=>res.text())
.then(msg=>{
alert(msg);
window.location="login.html";
});

}

const togglePassword = document.querySelector("#togglePassword");
const password = document.querySelector("#password");

togglePassword.addEventListener("click", function () {
    const type = password.type === "password" ? "text" : "password";
    password.type = type;
    this.classList.toggle("bi-eye");
    this.classList.toggle("bi-eye-slash");
});

const toggleConfirm = document.querySelector("#toggleConfirm");
const confirm = document.querySelector("#confirm");

toggleConfirm.addEventListener("click", function () {
    const type = confirm.type === "password" ? "text" : "password";
    confirm.type = type;
    this.classList.toggle("bi-eye");
    this.classList.toggle("bi-eye-slash");
});

</script>

</body>
</html>
