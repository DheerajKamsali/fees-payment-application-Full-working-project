<!DOCTYPE html>
<html>

<head>

<title>Acharya Bangalore B School - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-light">


<script>

// Protect dashboard
const token = localStorage.getItem("token");

if(!token){
window.location = "login.html";
}

</script>


<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h3>Acharya Bangalore B School - Student Dashboard</h3>

<button class="btn btn-sm btn-outline-danger" onclick="logout()">
<i class="bi bi-box-arrow-right">logout</i>
</button>

</div>


<div class="card shadow p-4">

<h5>Name: <span id="name"></span></h5>

<h5>Email: <span id="email"></span></h5>

<h5>Total Fee: Rs <span id="total"></span></h5>

<h5>Paid Amount: Rs <span id="paid"></span></h5>

<h5>Remaining: Rs <span id="remaining"></span></h5>


<button id="payBtn" class="btn btn-success mt-3" onclick="payNow()">
Pay Now
</button>


<button id="downloadBtn"
class="btn btn-primary mt-3"
style="display:none"
onclick="downloadReceipt()">
Download Receipt
</button>

</div>

</div>



<script>

let studentData = null;


// Load student data
fetch("/student/me",{

headers:{
"Authorization": "Bearer " + token
}

})
.then(res => res.json())
.then(data => {

studentData = data;

document.getElementById("name").innerText = data.name;
document.getElementById("email").innerText = data.email;
document.getElementById("total").innerText = data.totalFee;
document.getElementById("paid").innerText = data.paidAmount;

let remaining = data.totalFee - data.paidAmount;

document.getElementById("remaining").innerText = remaining;


// If full fee paid
if(remaining <= 0){

document.getElementById("payBtn").style.display = "none";

document.getElementById("downloadBtn").style.display = "block";

}

});



// Razorpay Payment
function payNow(){

fetch("/payment/create-order?amount=" +

(studentData.totalFee - studentData.paidAmount), {

method:"POST",

headers:{
"Authorization":"Bearer " + token
}

})
.then(res=>res.json())
.then(order=>{

var options = {

key: "your_key",

amount: order.amount,

currency: "INR",

order_id: order.id,

handler: function (response){

fetch("/payment/verify",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + token
},

body:JSON.stringify({

orderId: response.razorpay_order_id,
paymentId: response.razorpay_payment_id,
signature: response.razorpay_signature,
amount: order.amount/100

})

})
.then(res=>res.text())
.then(msg=>{

alert(msg);

window.location.reload();

});

}

};

var rzp = new Razorpay(options);

rzp.open();

});

}



// Download receipt
function downloadReceipt(){

fetch("/payment/download-receipt", {

headers:{
"Authorization":"Bearer " + token
}

})
.then(res => res.blob())
.then(blob => {

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;

a.download = "receipt.pdf";

document.body.appendChild(a);

a.click();

a.remove();

});

}



// Logout
function logout(){

localStorage.removeItem("token");
window.location="login.html";

}

</script>

</body>

</html>
