<!DOCTYPE html>
<html>
<head>
<title>Acharya Bangalore B School - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
background:#f4f6f9;
}

/* password eye icon */

.password-container{
position:relative;
}

.password-container i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* CAPTCHA STYLE */

.captcha-box{
display:inline-block;
font-weight:bold;
font-size:22px;
letter-spacing:5px;
padding:8px 15px;
border:2px dashed #6c757d;
background: repeating-linear-gradient(
45deg,
#f8f9fa,
#f8f9fa 10px,
#e9ecef 10px,
#e9ecef 20px
);
user-select:none;
}

</style>

</head>

<body class="bg-light">

<div class="container mt-5 col-md-4">

<div class="card p-4 shadow">

<h4>ACHARYA BANGALORE B SCHOOL</h4>

<h3 class="text-center">Student Registration</h3>

<input id="name" class="form-control mb-2" placeholder="Name">

<div class="input-group mb-2">
<input id="email" class="form-control" placeholder="Email">
<button class="btn btn-outline-primary" onclick="sendOtp()">Send OTP</button>
</div>

<div class="input-group mb-2">
<input id="otp" class="form-control" placeholder="Enter OTP">
<button class="btn btn-outline-success" onclick="verifyOtp()">Verify OTP</button>
</div>

<div class="password-container mb-2">

<input id="password" type="password" class="form-control" placeholder="Password">

<i class="bi bi-eye-slash" id="togglePassword"></i>

</div>

<div class="captcha-box mb-2 text-center" id="captchaBox"></div>

<div class="input-group mb-3">

<input id="captchaInput" class="form-control" placeholder="Enter CAPTCHA">

<button class="btn btn-outline-secondary" onclick="generateCaptcha()">
<i class="bi bi-arrow-clockwise"></i>
</button>

</div>

<button id="registerBtn" class="btn btn-success w-100" onclick="register()" disabled>
Register
</button>

<div class="text-center mt-3">
Already registered? <a href="login.html">Login here</a>
</div>

</div>
</div>

<script>

let generatedCaptcha="";

/* CAPTCHA GENERATION */

function generateCaptcha(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

generatedCaptcha="";

for(let i=0;i<5;i++){
generatedCaptcha += chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("captchaBox").innerHTML=generatedCaptcha;

}

generateCaptcha();

/* SEND OTP */

function sendOtp(){

fetch("/auth/send-otp?email="+document.getElementById("email").value,{
method:"POST"
})
.then(res=>res.text())
.then(msg=>alert(msg));

}

/* VERIFY OTP */

function verifyOtp(){

fetch("/auth/verify-otp?email="+
document.getElementById("email").value+
"&otp="+
document.getElementById("otp").value,
{method:"POST"})
.then(res=>res.text())
.then(msg=>{
alert(msg);
document.getElementById("registerBtn").disabled=false;
});

}

/* REGISTER */

function register(){

	let userCaptcha = document.getElementById("captchaInput").value.trim();

	if(userCaptcha !== generatedCaptcha){

	alert("Captcha incorrect");
	generateCaptcha();
	document.getElementById("captchaInput").value="";
	return;

	}

	fetch("/auth/register",{

	method:"POST",
	headers:{"Content-Type":"application/json"},
	body:JSON.stringify({

	name:document.getElementById("name").value,
	email:document.getElementById("email").value,
	password:document.getElementById("password").value

	})

	})
	.then(res=>res.text())
	.then(msg=>{
	alert(msg);
	window.location="login.html";
	});

	}

/* PASSWORD VIEW OPTION */

const togglePassword=document.querySelector("#togglePassword");

const password=document.querySelector("#password");

togglePassword.addEventListener("click",function(){

const type=password.getAttribute("type")==="password"?"text":"password";

password.setAttribute("type",type);

this.classList.toggle("bi-eye");

this.classList.toggle("bi-eye-slash");

});

</script>

</body>
</html>
